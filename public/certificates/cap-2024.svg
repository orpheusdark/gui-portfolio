  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14213d"/>
      <stop offset="100%" stop-color="#2a9d8f"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <rect x="60" y="60" width="1280" height="780" rx="28" fill="none" stroke="#ddf4f1" stroke-width="4"/>
  <text x="700" y="200" text-anchor="middle" fill="#ddf4f1" font-size="42" font-family="Segoe UI, Arial, sans-serif">Certificate Record</text>
