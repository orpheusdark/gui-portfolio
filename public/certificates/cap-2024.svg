  <text x="700" y="525" text-anchor="middle" fill="#d2efe9" font-size="24" font-family="Segoe UI, Arial, sans-serif">Local portfolio archive by Nirant Chavda (NC)</text>
  <text x="700" y="610" text-anchor="middle" fill="#ffffff" font-size="70" font-family="Segoe UI, Arial, sans-serif" font-weight="700">NC</text>
