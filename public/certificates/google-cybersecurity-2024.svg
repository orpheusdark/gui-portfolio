<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="Google Cybersecurity certificate 2024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b1b3a"/>
      <stop offset="100%" stop-color="#1768ac"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <rect x="60" y="60" width="1280" height="780" rx="28" fill="none" stroke="#d7e9ff" stroke-width="4"/>
  <text x="700" y="200" text-anchor="middle" fill="#d7e9ff" font-size="42" font-family="Segoe UI, Arial, sans-serif">Certificate Record</text>
  <text x="700" y="300" text-anchor="middle" fill="#ffffff" font-size="58" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Google Cybersecurity</text>
  <text x="700" y="380" text-anchor="middle" fill="#e3f0ff" font-size="34" font-family="Segoe UI, Arial, sans-serif">Issuer: Google</text>
  <text x="700" y="440" text-anchor="middle" fill="#e3f0ff" font-size="34" font-family="Segoe UI, Arial, sans-serif">Year: 2024</text>
  <text x="700" y="525" text-anchor="middle" fill="#d3e6ff" font-size="24" font-family="Segoe UI, Arial, sans-serif">Local portfolio archive by Nirant Chavda (NC)</text>
  <text x="700" y="610" text-anchor="middle" fill="#ffffff" font-size="70" font-family="Segoe UI, Arial, sans-serif" font-weight="700">NC</text>
